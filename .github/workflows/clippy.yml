name: Clippy

on:
  push:

jobs:
  clippy:
    name: cargo clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - run: |
          rustup toolchain install
      - run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings
